repositories:
  - name: actioncode
    fullName: SiddharthMishra28/actioncode
    defaultBranch: main
    allowedUsers:
      - 0  # Replace with your Telegram user ID from @userinfobot
    enabledCommands:
      - fix
      - add
      - refactor
      - review
      - explain
      - test
      - document
      - cleanup
      - improve
      - run
      - status
      - logs
    buildCommand: npm run build
    testCommand: npm test
    lintCommand: npm run lint
    installCommand: npm install
    environment:
      NODE_ENV: production

